<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AGI Leases Migration</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
  h1 { color: #1a56db; }
  .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  button { background: #1a56db; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1440a0; }
  .log { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 6px; font-family: monospace; font-size: 13px; height: 300px; overflow-y: auto; margin-top: 16px; }
  .log .ok { color: #4ec9b0; }
  .log .err { color: #f44747; }
  .log .info { color: #9cdcfe; }
  input[type=file] { margin-top: 8px; }
  progress { width: 100%; height: 20px; margin-top: 10px; }
  .warning { background: #fff3cd; border-left: 4px solid #f59e0b; padding: 12px; border-radius: 4px; margin-bottom: 16px; }
</style>
</head>
<body>
<h1>🔧 AGI Leases Migration</h1>
<div class="warning">⚠️ Make sure you cleared the leases tab in Google Sheets first (keeping headers). This will import all 229 leases.</div>

<div class="card">
  <h2>Select your latest JSON file</h2>
  <input type="file" id="jsonFile" accept=".json">
</div>

<div class="card">
  <h2>Run Leases Migration</h2>
  <button id="startBtn" disabled>Start Leases Migration</button>
  <progress id="progress" value="0" max="100" style="display:none"></progress>
  <div class="log" id="log"></div>
</div>

<script>
const BRIDGE_URL = 'https://script.google.com/macros/s/AKfycbwyQmfI665PCuvEM8zsJ0pmjwm2QNPtXvqkq02xEELaVoWEowVmqqgw1ILqDXNEZka2/exec';
const BATCH_SIZE = 50;

function log(msg, type='info'){
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = type;
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function post(payload){
  const res = await fetch(BRIDGE_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain' }
  });
  return res.json();
}

document.getElementById('jsonFile').addEventListener('change', e => {
  document.getElementById('startBtn').disabled = !e.target.files.length;
});

document.getElementById('startBtn').addEventListener('click', async () => {
  const file = document.getElementById('jsonFile').files[0];
  if(!file) return;
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  document.getElementById('progress').style.display = 'block';
  document.getElementById('log').innerHTML = '';

  try {
    log('📂 Reading JSON file...', 'info');
    const text = await file.text();
    const data = JSON.parse(text);
    const leases = data.leases || [];
    log('✅ Found ' + leases.length + ' leases', 'ok');

    // Map leases to correct field names matching Google Sheets headers
    const mapped = leases.map(l => ({
      id: l.id || '',
      leaseNumber: l.leaseNumber || '',
      company: l.company || '',
      supplier: l.supplier || '',
      arrangement: l.arrangement || '',
      invoicing: l.invoicing || '',
      notes: l.notes || '',
      status: l.status || 'Enabled',
      fromDate: l.fromDate || '',
      toDate: l.toDate || ''
    }));

    log('📤 Migrating ' + mapped.length + ' leases in batches...', 'info');
    let sent = 0;
    while(sent < mapped.length){
      const batch = mapped.slice(sent, sent + BATCH_SIZE);
      const result = await post({ action: 'bulkSave', sheet: 'leases', data: batch });
      if(!result.success) throw new Error('Batch failed: ' + JSON.stringify(result));
      sent += batch.length;
      const pct = Math.round((sent/mapped.length)*100);
      document.getElementById('progress').value = pct;
      log('  ✅ ' + sent + '/' + mapped.length + ' leases saved', 'ok');
      await new Promise(r => setTimeout(r, 500));
    }

    log('🎉 Leases migration complete!', 'ok');
    log('You can now close this tool.', 'info');

  } catch(err) {
    log('❌ Error: ' + err.message, 'err');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
